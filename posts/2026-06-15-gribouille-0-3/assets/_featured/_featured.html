  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
  }

  body {
    display: flex;
    align-items: center;
    gap: 44px;
    padding: 60px 64px;
    background-color: var(--paper);
    background-image: var(--grain);
    background-repeat: repeat;
    background-size: 180px 180px;
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .left {
    flex: 0 0 512px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  .wordmark {
    width: 432px;
    height: auto;
    display: block;
  }

  .tagline {
    max-width: 100%;
    text-align: center;
    font-family: Georgia, "Times New Roman", serif;
    font-style: italic;
    font-weight: 400;
    font-size: 28px;
    line-height: 1.3;
    letter-spacing: -0.005em;
    color: var(--ink);
  }

  .release-tag {
    display: inline-block;
    padding: 6px 14px;
    border-radius: 999px;
    background: var(--primary);
    color: var(--paper);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .url {
    margin-top: 4px;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    text-align: center;
    color: var(--muted);
  }

  .right {
    flex: 1 1 auto;
    min-width: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .figure-card {
    display: flex;
    padding: 18px;
    background: var(--surface);
    border: 1.5px solid var(--ink);
    border-radius: 16px;
    box-shadow: 6px 6px 0 0 var(--ink);
    transform: rotate(0.75deg);
  }

  .figure-card img {
    display: block;
    width: auto;
    height: auto;
    max-width: 100%;
    max-height: 458px;
  }
</style>
</head>
<body>
  <div class="left">
    <img class="wordmark" src="./logo.svg" alt="Gribouille">
    <p class="tagline">Create elegant graphics with<br>the Grammar of Graphics<br>for Typst.</p>
    <span class="release-tag">v0.3.0 release</span>
    <p class="url">m.canouil.dev/gribouille</p>
  </div>
  <div class="right">
    <div class="figure-card">
      <img src="./penguins-light.svg" alt="Scatter plot of penguin flipper length versus body mass by species">
    </div>
  </div>
</body>
</html>
