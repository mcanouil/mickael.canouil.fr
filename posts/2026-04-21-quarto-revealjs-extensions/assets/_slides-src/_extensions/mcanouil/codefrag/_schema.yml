# _schema.yml for "codefrag" revealjs-plugin extension
# Describes plugin options for IDE tooling and runtime validation.

# Extension-level metadata options.
# Configured in _quarto.yml, _metadata.yml, or document front matter:
#   extensions:
#     codefrag:
#       enabled: true

$schema: https://m.canouil.dev/quarto-wizard/assets/schema/v1/extension-schema.json

options:
  enabled:
    type: boolean
    default: true
    description: "Enable or disable code annotation fragment navigation."

attributes:
  code-block:
    code-annotation-fragment-indices:
      type: string
      description: "Comma-separated fragment indices assigned to each code annotation, in annotation order (e.g. \"2,4,6\")."
    code-line-fragment-indices:
      type: string
      description: "Comma-separated fragment indices assigned to each line-highlight step, starting with the original code as step 0 (e.g. \"0,2,4,6\"). Requires `code-line-numbers`."
