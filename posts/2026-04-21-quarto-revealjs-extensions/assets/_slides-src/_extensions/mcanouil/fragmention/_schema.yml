# _schema.yml for "fragmention" filter extension
# Describes element attributes for IDE tooling and runtime validation.
#
# The filter detects empty Spans with .fragment class at the start of list
# items and hoists their attributes to the parent <li> element.
# No extension-level options are required.

# Element attributes accepted by the filter on Pandoc elements.
# Used in: []{.fragment fragment-index="1"} at the start of a list item.
element-attributes:
  fragment:
    fragment-index:
      type: string
      description: "RevealJS fragment index controlling the order of appearance."
