  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
  }

  body {
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 72px;
    padding: 76px 84px;
    background-color: var(--bg0);
    background-image:
      var(--grain),
      radial-gradient(820px 460px at 28% 30%, rgba(68,112,153,0.42), rgba(14,23,38,0) 62%),
      linear-gradient(135deg, var(--bg0) 0%, var(--bg1) 100%);
    background-repeat: repeat, no-repeat, no-repeat;
    background-size: 180px 180px, auto, auto;
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  /* faint decorative rings, top-right */
  .deco {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(159,179,200,0.12);
    pointer-events: none;
  }
  .deco.a { width: 360px; height: 360px; top: -150px; right: -90px; }
  .deco.b { width: 220px; height: 220px; top: -70px; right: 40px; border-color: rgba(159,179,200,0.18); }

  .head { position: relative; z-index: 2; }

  .eyebrow {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 0.26em;
    text-transform: uppercase;
    color: var(--blue);
    margin-bottom: 20px;
  }

  .title {
    font-size: 86px;
    font-weight: 800;
    line-height: 0.98;
    letter-spacing: -0.03em;
    color: var(--ink);
  }
  .title .accent { color: var(--blue); }

  .subtitle {
    margin-top: 18px;
    font-family: Georgia, "Times New Roman", serif;
    font-style: italic;
    font-size: 28px;
    color: var(--muted);
  }

  /* timeline */
  .timeline {
    position: relative;
    z-index: 2;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 12px;
  }
  .timeline::before {
    content: "";
    position: absolute;
    left: 14px;
    right: 14px;
    top: 13px;
    height: 2px;
    background: linear-gradient(90deg, var(--blue-d) 0%, var(--blue) 80%, var(--accent) 100%);
    box-shadow: 0 0 20px rgba(110,155,197,0.55);
  }
  .node { position: relative; display: flex; flex-direction: column; align-items: center; gap: 16px; }
  .dot {
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--blue);
    box-shadow: 0 0 0 5px rgba(110,155,197,0.16), 0 0 16px rgba(110,155,197,0.7);
  }
  .node.last .dot {
    width: 24px; height: 24px;
    background: var(--accent);
    box-shadow: 0 0 0 6px rgba(233,76,61,0.18), 0 0 20px rgba(233,76,61,0.75);
  }
  .year { font-size: 22px; font-weight: 700; color: var(--muted); letter-spacing: 0.02em; }
  .node.last .year { color: var(--ink); }
</style>
</head>
<body>
  <div class="deco a"></div>
  <div class="deco b"></div>

  <div class="head">
    <div class="eyebrow">Four years with Quarto</div>
    <div class="title">Why <span class="accent">Quarto</span> Stuck</div>
    <div class="subtitle">From R Markdown to one CLI.</div>
  </div>

  <div class="timeline">
    <div class="node"><span class="dot"></span><span class="year">2022</span></div>
    <div class="node"><span class="dot"></span><span class="year">2023</span></div>
    <div class="node"><span class="dot"></span><span class="year">2024</span></div>
    <div class="node"><span class="dot"></span><span class="year">2025</span></div>
    <div class="node last"><span class="dot"></span><span class="year">2026</span></div>
  </div>
</body>
</html>
