# options specified here will apply to all posts in this folder

# freeze computational output
# (see https://quarto.org/docs/projects/code-execution.html#freeze)
freeze: true

# Enable banner style title blocks
title-block-banner: true

authors:
  - name:
      given: Mickaël
      family: CANOUIL
    degrees: "Ph.D."
    email: pro@mickael.canouil.dev
    orcid: 0000-0002-3396-4549
    url: https://mickael.canouil.fr
license: CC BY-NC-SA

citation:
  type: post-weblog
  container-title: "mickael.canouil.fr"
csl: ../assets/apa.csl

lightbox: true

code-annotations: below
footnotes-hover: true

toc: true
number-sections: true
back-to-top-navigation: true

comments:
  giscus:
    mapping: title
    theme:
      dark: dark_dimmed
      light: light
    repo: "{{GISCUS_REPO}}"
    repo-id: "{{GISCUS_REPO_ID}}"
    category: "{{GISCUS_CATEGORY}}"
    category-id: "{{GISCUS_CATEGORY_ID}}"

knitr:
  opts_chunk:
    collapse: true
    comment: "#>"

execute:
  warning: false
  message: false
