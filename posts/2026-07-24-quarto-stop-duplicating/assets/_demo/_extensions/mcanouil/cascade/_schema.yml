# Schema for the cascade extension

$schema: https://m.canouil.dev/quarto-wizard/assets/schema/v2/extension-schema.json

options:
  keep-hrule:
    type: boolean
    default: false
    description: >
      Whether to keep horizontal rules (`---`) in non-reveal.js formats.
  depth:
    type: integer
    minimum: 0
    description: >
      Maximum number of heading levels of the chain to repeat on continuation slides, counted from the slide level.

attributes:
  _any:
    cascade-depth:
      type: integer
      minimum: 0
      description: >
        Per-heading override of the document-level `depth` for the chain starting at that heading.

classes:
  no-cascade:
    description: >
      Excludes the heading from the repeated chain on continuation slides.
