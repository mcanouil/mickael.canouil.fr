<script id="talks-toc" type="text/javascript">
  document.addEventListener("DOMContentLoaded", () => {
    if (!document.body.classList.contains("talks-page")) return;

    const headers = Array.from(document.querySelectorAll("section.talks-section[id]"));
    if (headers.length === 0) return;

    const sidebar = document.getElementById("quarto-margin-sidebar");
    if (!sidebar) return;
    sidebar.classList.remove("zindex-bottom");

    const tocTitle = document.createElement("h2");
    tocTitle.id = "toc-title";
    tocTitle.textContent = "Years";

    const list = document.createElement("ul");

    const links = headers.map((h) => {
      const id = h.id;
      const year = h.querySelector(".talks-year")?.textContent?.trim() || id.replace("talks-", "");
      const li = document.createElement("li");
      const a = document.createElement("a");
      a.href = `#${id}`;
      a.id = `toc-${id}`;
      a.className = "nav-link";
      a.setAttribute("data-scroll-target", `#${id}`);
      a.textContent = year;
      li.appendChild(a);
      list.appendChild(li);
      return { id, anchor: a, header: h };
    });

    const nav = document.createElement("nav");
    nav.id = "TOC";
    nav.setAttribute("role", "doc-toc");
    nav.className = "toc-active";
    nav.appendChild(tocTitle);
    nav.appendChild(list);

    const tocActions = sidebar.querySelector(".toc-actions");
    if (tocActions) {
      nav.appendChild(tocActions);
    }
    sidebar.insertBefore(nav, sidebar.firstChild);

    const setActive = (targetId) => {
      links.forEach(({ id, anchor }) => {
        anchor.classList.toggle("active", id === targetId);
      });
    };

    if ("IntersectionObserver" in window) {
      const observer = new IntersectionObserver(
        (entries) => {
          const visible = entries
            .filter((e) => e.isIntersecting)
            .sort((a, b) => a.boundingClientRect.top - b.boundingClientRect.top);
          if (visible.length > 0) {
            setActive(visible[0].target.id);
          }
        },
        { rootMargin: "-20% 0px -70% 0px", threshold: 0 },
      );
      headers.forEach((h) => observer.observe(h));
    }

    if (links.length > 0) {
      setActive(links[0].id);
    }
  });
</script>
