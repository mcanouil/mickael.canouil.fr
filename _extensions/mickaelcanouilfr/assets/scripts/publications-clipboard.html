<script id="publications-bibtex-clipboard" type="text/javascript">
  document.addEventListener("DOMContentLoaded", () => {
    const decode = (b64) => {
      try {
        const bin = atob(b64);
        const bytes = new Uint8Array(bin.length);
        for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
        return new TextDecoder().decode(bytes);
      } catch {
        return "";
      }
    };

    document.querySelectorAll(".pub-chip[data-bibtex]").forEach((btn) => {
      btn.addEventListener("click", async () => {
        const text = decode(btn.getAttribute("data-bibtex") || "");
        const original = btn.textContent;
        try {
          await navigator.clipboard.writeText(text);
          btn.classList.add("pub-chip--copied");
          btn.textContent = "Copied";
        } catch {
          btn.classList.add("pub-chip--copied");
          btn.textContent = "Copy failed";
        }
        setTimeout(() => {
          btn.classList.remove("pub-chip--copied");
          btn.textContent = original;
        }, 1500);
      });
    });
  });
</script>
