<script id="a11y-fixes" type="text/javascript">
  /**
   * @license MIT
   * @copyright 2026 Mickaël Canouil
   * @author Mickaël Canouil
   */
  document.addEventListener("DOMContentLoaded", () => {
    // Logo link: Quarto emits <a class="navbar-brand-logo"> with an inner <img alt>
    // but axe sees no accessible name when the img is hidden by CSS.
    document.querySelectorAll("a.navbar-brand-logo:not([aria-label])").forEach((a) => {
      a.setAttribute("aria-label", "Mickaël CANOUIL — home");
    });

    // Color scheme toggle: Quarto adds title= but no aria-label.
    document.querySelectorAll("a.quarto-color-scheme-toggle:not([aria-label])").forEach((a) => {
      a.setAttribute("aria-label", a.getAttribute("title") || "Toggle colour scheme");
    });

    // Navbar search input: Quarto's inline button has no visible label.
    const searchInput = document.querySelector(
      ".aa-Input, input.aa-Input, input[placeholder='Search'], input[type='search']"
    );
    if (searchInput && !searchInput.getAttribute("aria-label")) {
      searchInput.setAttribute("aria-label", "Search the site");
    }

    // CSL bibliography appendix: Quarto emits role="listitem" without role="list"
    // parent. Promote each listitem itself to a list (it already wraps its own
    // content); avoids adding role="list" to a parent that also contains
    // unrelated children (axe rejects buttons inside role="list").
    document.querySelectorAll('[role="listitem"]').forEach((el) => {
      el.removeAttribute("role");
    });

    // Disambiguate duplicate banner landmarks. The Quarto title-block header
    // (page-level) is also a <header>, which axe flags as a duplicate banner
    // role alongside the site navbar. Strip the implicit banner role from the
    // title-block via role="presentation" (header element disallows region).
    const siteHeader = document.getElementById("quarto-header");
    if (siteHeader && !siteHeader.getAttribute("aria-label")) {
      siteHeader.setAttribute("aria-label", "Site banner");
    }
    const titleHeader = document.querySelector("header#title-block-header, header.quarto-title-block");
    if (titleHeader) {
      titleHeader.setAttribute("role", "presentation");
    }
    const navbarPrimary = document.querySelector(".navbar");
    if (navbarPrimary && !navbarPrimary.getAttribute("aria-label")) {
      navbarPrimary.setAttribute("aria-label", "Primary");
    }
    const tocNav = document.querySelector("#TOC, nav#TOC, .sidebar-toc nav");
    if (tocNav && !tocNav.getAttribute("aria-label")) {
      tocNav.setAttribute("aria-label", "On this page");
    }

    // Listing category sidebar: Quarto emits <h5>Categories</h5> after page <h1>,
    // breaking the heading order. Re-tag to <h2> so the document outline stays
    // monotonic, and put the sidebar block in a labelled landmark.
    document.querySelectorAll("h5.quarto-listing-category-title").forEach((h5) => {
      const h2 = document.createElement("h2");
      for (const attr of h5.attributes) h2.setAttribute(attr.name, attr.value);
      h2.innerHTML = h5.innerHTML;
      h5.replaceWith(h2);
    });

    // Wrap orphan listing-category, listing-category-title, margin-header, and
    // title-banner in labelled landmarks so axe's region rule passes. Skip if
    // already inside another landmark (axe rejects nested top-level complementary).
    const insideLandmark = (el) =>
      el && el.closest('main, [role="main"], aside, [role="complementary"], nav, [role="navigation"], section[aria-label], section[aria-labelledby]');
    const labelOnce = (el, role, label) => {
      if (!el || el.getAttribute("role") || insideLandmark(el.parentElement)) return;
      el.setAttribute("role", role);
      if (!el.getAttribute("aria-label")) el.setAttribute("aria-label", label);
    };

    // Group the listing categories title and list as one complementary landmark.
    // Use <div role="complementary"> instead of <aside>: Quarto's quarto.js treats
    // any <aside> as a margin-column conflict element and collapses the entire
    // margin-sidebar into a navbar toggle when it intersects.
    document.querySelectorAll(".quarto-listing-category-title").forEach((title) => {
      const next = title.nextElementSibling;
      if (next && next.classList.contains("quarto-listing-category") && !insideLandmark(title.parentElement)) {
        const wrap = document.createElement("div");
        wrap.setAttribute("role", "complementary");
        wrap.setAttribute("aria-label", "Listing filters");
        title.parentNode.insertBefore(wrap, title);
        wrap.appendChild(title);
        wrap.appendChild(next);
      }
    });
    // Skip the mobile sidebar-toggle clone; it duplicates the desktop sidebar
    // and would create non-unique landmarks.
    const inToggleClone = (el) => el && el.closest(".quarto-sidebar-toggle-contents, .quarto-sidebar-toggle");

    document.querySelectorAll(".quarto-listing-category").forEach((el) => {
      if (inToggleClone(el)) return;
      labelOnce(el, "complementary", "Listing filters");
    });
    document.querySelectorAll(".quarto-margin-header").forEach((el) => {
      if (inToggleClone(el)) return;
      if (el.querySelector('aside[aria-label="Listing filters"], .quarto-listing-category')) return;
      labelOnce(el, "complementary", "Page metadata");
    });
    document.querySelectorAll(".quarto-title-banner").forEach((el) => labelOnce(el, "region", "Page header"));
    document.querySelectorAll(".quarto-title-meta").forEach((el) => labelOnce(el, "region", "Page metadata"));

    // Quarto's sidebar-toggle clones the labelled landmarks into a mobile-only
    // container after our handlers run. Suffix the cloned landmarks' labels so
    // axe sees them as unique from the desktop originals.
    const dedupeCloneLandmarks = () => {
      document
        .querySelectorAll('.quarto-sidebar-toggle-contents [role="complementary"], .quarto-sidebar-toggle-contents [role="region"], .quarto-sidebar-toggle-contents aside')
        .forEach((el) => {
          const label = el.getAttribute("aria-label");
          if (label && !/\(mobile\)$/.test(label)) {
            el.setAttribute("aria-label", `${label} (mobile)`);
          }
        });
    };
    dedupeCloneLandmarks();
    setTimeout(dedupeCloneLandmarks, 50);
    setTimeout(dedupeCloneLandmarks, 250);
  });
</script>
