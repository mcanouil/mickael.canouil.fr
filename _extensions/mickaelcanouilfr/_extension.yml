title: Mickaël Canouil — Website Format
author: Mickaël Canouil
version: 0.1.0
quarto-required: ">=1.9.37"
contributes:
  formats:
    html:
      grid:
        body-width: 1000px
        sidebar-width: 250px
        margin-width: 250px
      theme:
        light:
          - scss/mickaelcanouilfr.scss
        dark:
          - scss/mickaelcanouilfr.scss
          - scss/_dark.scss
      include-before-body:
        - assets/scripts/skip-link.html
      include-after-body:
        - assets/scripts/base64.html
        - assets/scripts/categories-alphabetical.html
        - assets/scripts/publications-clipboard.html
        - assets/scripts/year-toc.html
        - assets/scripts/ordinal-dates.html
        - assets/scripts/navbar-tooltips.html
        - assets/scripts/title-block-header.html
        - assets/scripts/a11y-fixes.html
      template-partials:
        - _partials/_title-meta-author.html
      filters:
        - filters/current-year.lua
      lang: en-GB
      date-format: "dddd[, the] Do [of] MMMM, YYYY"
      anchor-sections: true
      email-obfuscation: javascript
      link-external-newwindow: true
      fig-align: center
      code-copy: true
      code-overflow: wrap
      code-link: false
      code-tools:
        source: false
        toggle: false
        caption: none
      syntax-highlighting:
        light: github-light
        dark: github-dark
  project:
    project:
      type: website
    website:
      favicon: assets/images/logo-gold-path.svg
      back-to-top-navigation: true
      page-navigation: true
      open-graph: true
      twitter-card: true
      repo-actions: [edit, issue]
      repo-link-target: _blank
      repo-link-rel: noopener noreferrer
      navbar:
        search: true
        background: dark
        foreground: light
        logo:
          light: assets/images/logo-gold-path.svg
          dark: assets/images/logo-gold-path.svg
        logo-alt: Mickaël CANOUIL logo
      page-footer:
        border: true
        background: dark
        foreground: light
    format: mickaelcanouilfr-html
