title: Mickaël Canouil — Website Format
author: Mickaël Canouil
version: 0.1.0
quarto-required: ">=1.9.37"
contributes:
  formats:
    html:
      theme:
        - scss/mickaelcanouilfr.scss
      include-after-body:
        - assets/scripts/modal-clipboardjs.html
        - assets/scripts/categories-alphabetical.html
        - assets/scripts/publications-clipboard.html
        - assets/scripts/publications-toc.html
      filters:
        - filters/external-links.lua
        - filters/ordinal-dates.lua
        - filters/current-year.lua
        - filters/luxury-classes.lua
      lang: en-GB
      date-format: "dddd[, the] Do [of] MMMM, YYYY"
      anchor-sections: true
      email-obfuscation: javascript
      link-external-newwindow: true
      fig-align: center
      code-copy: true
      code-overflow: wrap
      syntax-highlighting:
        light: github-light
        dark: github-dark
  project:
    project:
      type: website
    website:
      back-to-top-navigation: true
      page-navigation: true
      open-graph: true
      twitter-card: true
      navbar:
        background: dark
        foreground: light
    format: mickaelcanouilfr-html
