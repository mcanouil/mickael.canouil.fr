project:
  type: mickaelcanouilfr
  pre-render:
    - publications/publications.ts
  resources:
    - _headers

website:
  title: "Mickaël CANOUIL"
  description: "A data science blog and portfolio by Mickaël CANOUIL"
  image: /assets/images/social-profile.png
  site-url: https://mickael.canouil.fr
  repo-url: https://github.com/mcanouil/mickael.canouil.fr
  page-footer:
    left: |
      Powered by [{{< iconify simple-icons:quarto title="Quarto Logo" label="Quarto Logo" >}} Quarto](https://quarto.org){target="_blank" rel="noopener noreferrer"}.
    center: |
      &copy; []{#current-year} [Mickaël CANOUIL](https://mickael.canouil.fr){target="_blank" rel="noopener noreferrer"}. [{{< iconify octicon:heart-fill-16 title="Heart" label="Heart" >}} Sponsor](https://github.com/sponsors/mcanouil?o=esb){target="_blank" rel="noopener noreferrer"}.
    right: |
      License: [CC BY-NC-SA 4.0](https://creativecommons.org/licenses/by-nc-sa/4.0){target="_blank" rel="noopener noreferrer"}.
  navbar:
    right:
      - text: About
        href: index.qmd
      - text: Blog
        href: blog.qmd
      - text: Projects
        href: projects/index.qmd
      - text: Talks
        href: talks/index.qmd
      - text: Publications
        href: publications/index.qmd
      - text: '{{< iconify fa7-brands:bluesky title="BlueSky" label="BlueSky" >}}'
        href: "https://bsky.app/profile/mickael.canouil.fr"
        target: _blank
        rel: noopener noreferrer
        aria-label: "BlueSky profile"
      - text: '{{< iconify fa7-brands:linkedin title="LinkedIn" label="LinkedIn" >}}'
        href: "https://www.linkedin.com/in/mickaelcanouil"
        target: _blank
        rel: noopener noreferrer
        aria-label: "LinkedIn profile"
      - text: '{{< iconify fa7-brands:mastodon title="Mastodon" label="Mastodon" >}}'
        href: "https://fosstodon.org/@MickaelCanouil"
        target: _blank
        rel: noopener noreferrer me
        aria-label: "Mastodon profile"
      - text: '{{< iconify octicon:mark-github-16 title="GitHub" label="GitHub" >}}'
        href: "https://github.com/mcanouil"
        target: _blank
        rel: noopener noreferrer
        aria-label: "GitHub profile"
      - text: '{{< iconify octicon:heart-fill-16 title="GitHub Sponsor" label="GitHub Sponsor" >}}'
        href: "https://github.com/sponsors/mcanouil?o=esb"
        target: _blank
        rel: noopener noreferrer
        aria-label: "GitHub Sponsor"

lightbox: auto

execute:
  freeze: true

filters:
  - at: pre-quarto
    path: include-code-files
  - at: pre-quarto
    path: typst-render
  - at: pre-quarto
    path: code-window

extensions:
  typst-render:
    output-directory: ./typst-render
    dpi: 300
    format: png
